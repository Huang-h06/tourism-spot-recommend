<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理员后台</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:"Microsoft YaHei","PingFang SC",sans-serif; display:flex; min-height:100vh; }
.sidebar{ width:220px; background:#1a1a2e; color:#fff; padding:24px 0; flex-shrink:0; }
.sidebar h2{ text-align:center; font-size:18px; margin-bottom:30px; padding:0 16px; }
.sidebar a{ display:block; color:#aaa; text-decoration:none; padding:12px 24px; font-size:14px; cursor:pointer; transition:all 0.2s; }
.sidebar a:hover,.sidebar a.active{ color:#fff; background:rgba(255,255,255,0.1); border-left:3px solid #3478f6; }
.main{ flex:1; padding:24px 30px; background:#f5f7fa; overflow-y:auto; }
.main h3{ margin-bottom:18px; color:#222; font-size:20px; }
.panel{ display:none; }
.panel.active{ display:block; }

table{ width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 1px 8px rgba(0,0,0,0.06); font-size:13px; }
th,td{ padding:12px 14px; text-align:left; border-bottom:1px solid #eee; }
th{ background:#f0f2f5; color:#555; font-weight:600; }
tr:hover{ background:#f9fafb; }

.badge{ display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; }
.badge-success{ background:#e6f7e6; color:#52c41a; }
.badge-danger{ background:#fff1f0; color:#ff4d4f; }
.badge-warning{ background:#fff7e6; color:#fa8c16; }
.badge-info{ background:#e6f4ff; color:#1677ff; }

.btn{ padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-size:13px; }
.btn-primary{ background:#3478f6; color:#fff; }
.btn-danger{ background:#ff4d4f; color:#fff; }
.btn-warning{ background:#fa8c16; color:#fff; }
.btn-sm{ padding:4px 10px; font-size:12px; }
.btn-group{ display:flex; gap:6px; }

.modal-overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:#00000050; display:none; justify-content:center; align-items:center; z-index:200; }
.modal-overlay.show{ display:flex; }
.modal-box{ background:#fff; border-radius:10px; width:500px; max-width:90%; max-height:85vh; overflow-y:auto; padding:24px; position:relative; }
.modal-box h3{ margin-bottom:16px; text-align:center; }
.modal-box input,.modal-box textarea,.modal-box select{ width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:10px; }
.modal-box textarea{ min-height:100px; resize:vertical; }
.modal-box button[type="submit"]{ width:100%; padding:10px; border:none; border-radius:6px; background:#3478f6; color:#fff; font-size:15px; cursor:pointer; }
.modal-box .close{ position:absolute; top:10px; right:14px; font-size:20px; cursor:pointer; color:#999; }
.form-row{ display:flex; gap:10px; }
.form-row input{ flex:1; }

.empty-tip{ text-align:center; padding:60px; color:#aaa; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>⚙️ 管理后台</h2>
    <a class="active" onclick="switchPanel('spots')">景点管理</a>
    <a onclick="switchPanel('users')">用户管理</a>
    <a onclick="switchPanel('comments')">评论管理</a>
    <a href="/">← 返回首页</a>
</div>
<div class="main">
    <!-- 景点管理 -->
    <div class="panel active" id="panel-spots">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">景点列表</h3>
            <button class="btn btn-primary" onclick="openSpotModal()">+ 新增景点</button>
        </div>
        <table><thead><tr><th>ID</th><th>景点名</th><th>城市</th><th>等级</th><th>标签</th><th>评分</th><th>状态</th><th>操作</th></tr></thead><tbody id="spotTable"></tbody></table>
    </div>
    <!-- 用户管理 -->
    <div class="panel" id="panel-users">
        <h3>用户列表</h3>
        <table><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="userTable"></tbody></table>
    </div>
    <!-- 评论管理 -->
    <div class="panel" id="panel-comments">
        <h3>评论列表</h3>
        <table><thead><tr><th>ID</th><th>用户</th><th>内容</th><th>评分</th><th>时间</th><th>操作</th></tr></thead><tbody id="commentTable"></tbody></table>
    </div>
</div>

<!-- 景点编辑弹窗 -->
<div class="modal-overlay" id="spotModal">
    <div class="modal-box">
        <div class="close" onclick="closeSpotModal()">&times;</div>
        <h3 id="spotModalTitle">新增景点</h3>
        <input type="hidden" id="spotId">
        <input type="text" id="spotName" placeholder="景点名称 *">
        <div class="form-row">
            <input type="text" id="spotCity" placeholder="城市 *">
            <input type="text" id="spotLevel" placeholder="等级">
        </div>
        <input type="text" id="spotTag" placeholder="标签">
        <textarea id="spotDesc" placeholder="简介"></textarea>
        <div class="form-row">
            <input type="number" id="spotLat" placeholder="纬度" step="any">
            <input type="number" id="spotLng" placeholder="经度" step="any">
        </div>
        <input type="text" id="spotSeason" placeholder="最佳季节">
        <input type="text" id="spotDuration" placeholder="建议时长">
        <input type="text" id="spotTicket" placeholder="门票">
        <input type="text" id="spotOpenTime" placeholder="开放时间">
        <input type="text" id="spotTransport" placeholder="交通方式">
        <button type="submit" onclick="saveSpot()">保存</button>
    </div>
</div>

<script>
// 检查管理员权限
const user = JSON.parse(localStorage.getItem("user")||"null");
if(!user){ alert("请先登录"); location.href="/"; }

fetch(`/api/admin/check?user_id=${user.id}`).then(r=>r.json()).then(r=>{
    if(!r.data||!r.data.is_admin){ alert("无管理员权限"); location.href="/"; return; }
    // 同步本地缓存中的角色
    user.role = r.data.role;
    localStorage.setItem("user", JSON.stringify(user));
    loadAll();
});

function switchPanel(name){
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
    document.getElementById("panel-"+name).classList.add("active");
    event.target.classList.add("active");
}
function badge(s,v){ return `<span class="badge ${s}">${v}</span>`; }

// ===== 景点管理 =====
let spotsData = [];
function loadSpots(){
    fetch("/api/spots?all=1").then(r=>r.json()).then(result=>{
        spotsData = result.data||[];
        document.getElementById("spotTable").innerHTML = spotsData.map(s=>{
            const statusBadge = s.status==='inactive'?badge('badge-danger','已下架'):badge('badge-success','上架');
            const star = s.avg_rating>0? `⭐${s.avg_rating}` : '-';
            return `<tr>
                <td>${s.id}</td><td><b>${s.name}</b></td><td>${s.city}</td><td>${s.level||'-'}</td><td>${s.tag||'-'}</td><td>${star}</td><td>${statusBadge}</td>
                <td><div class="btn-group">
                    <button class="btn btn-sm btn-primary" onclick="editSpot(${s.id})">编辑</button>
                    <button class="btn btn-sm btn-warning" onclick="toggleSpot(${s.id},'${s.status==='inactive'?'active':'inactive'}')">${s.status==='inactive'?'上架':'下架'}</button>
                    <button class="btn btn-sm btn-danger" onclick="delSpot(${s.id})">删除</button>
                </div></td>
            </tr>`;
        }).join('');
    });
}
function openSpotModal(sid){
    document.getElementById("spotId").value="";
    document.getElementById("spotName").value="";
    document.getElementById("spotCity").value="";
    document.getElementById("spotLevel").value="";
    document.getElementById("spotTag").value="";
    document.getElementById("spotDesc").value="";
    document.getElementById("spotLat").value="";
    document.getElementById("spotLng").value="";
    document.getElementById("spotSeason").value="";
    document.getElementById("spotDuration").value="";
    document.getElementById("spotTicket").value="";
    document.getElementById("spotOpenTime").value="";
    document.getElementById("spotTransport").value="";
    document.getElementById("spotModalTitle").textContent="新增景点";
    if(sid){
        const s = spotsData.find(x=>x.id===sid);
        if(s){
            document.getElementById("spotId").value=s.id;
            document.getElementById("spotName").value=s.name||'';
            document.getElementById("spotCity").value=s.city||'';
            document.getElementById("spotLevel").value=s.level||'';
            document.getElementById("spotTag").value=s.tag||'';
            document.getElementById("spotDesc").value=s.desc||'';
            document.getElementById("spotLat").value=s.lat||0;
            document.getElementById("spotLng").value=s.lng||0;
            document.getElementById("spotSeason").value=s.best_season||'';
            document.getElementById("spotDuration").value=s.duration||'';
            document.getElementById("spotTicket").value=s.ticket||'';
            document.getElementById("spotOpenTime").value=s.open_time||'';
            document.getElementById("spotTransport").value=s.transport||'';
            document.getElementById("spotModalTitle").textContent="编辑景点";
        }
    }
    document.getElementById("spotModal").classList.add("show");
}
function closeSpotModal(){ document.getElementById("spotModal").classList.remove("show"); }
function editSpot(sid){ openSpotModal(sid); }
function saveSpot(){
    const sid=document.getElementById("spotId").value;
    const name=document.getElementById("spotName").value.trim();
    const city=document.getElementById("spotCity").value.trim();
    if(!name||!city){ alert("景点名和城市不能为空"); return; }
    const body={
        name,city,
        level:document.getElementById("spotLevel").value.trim(),
        tag:document.getElementById("spotTag").value.trim(),
        desc:document.getElementById("spotDesc").value.trim(),
        lat:parseFloat(document.getElementById("spotLat").value)||0,
        lng:parseFloat(document.getElementById("spotLng").value)||0,
        best_season:document.getElementById("spotSeason").value.trim(),
        duration:document.getElementById("spotDuration").value.trim(),
        ticket:document.getElementById("spotTicket").value.trim(),
        open_time:document.getElementById("spotOpenTime").value.trim(),
        transport:document.getElementById("spotTransport").value.trim()
    };
    const url = sid ? `/api/admin/spots/${sid}` : "/api/admin/spots";
    const method = sid ? "PUT" : "POST";
    fetch(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()).then(r=>{
        if(r.code===200){ closeSpotModal(); loadSpots(); } else alert(r.msg);
    });
}
function toggleSpot(sid,status){
    fetch(`/api/admin/spots/${sid}/toggle`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({status})}).then(r=>r.json()).then(r=>{ loadSpots(); });
}
function delSpot(sid){
    if(!confirm("确定删除该景点？相关评论和收藏也会失效。")) return;
    fetch(`/api/admin/spots/${sid}`,{method:"DELETE"}).then(r=>r.json()).then(r=>{ loadSpots(); });
}
document.getElementById("spotModal").addEventListener("click",e=>{ if(e.target.id==="spotModal") closeSpotModal(); });

// ===== 用户管理 =====
function loadUsers(){
    fetch("/api/admin/users").then(r=>r.json()).then(result=>{
        const data = result.data||[];
        document.getElementById("userTable").innerHTML = data.map(u=>{
            const roleBadge = u.role==='admin'?badge('badge-info','管理员'):badge('badge-warning','普通用户');
            const statusBadge = u.enabled===false?badge('badge-danger','已封禁'):badge('badge-success','正常');
            const isSelf = u.id===user.id;
            return `<tr>
                <td>${u.id}</td><td>${u.username}</td><td>${u.email||'-'}</td><td>${roleBadge}</td><td>${statusBadge}</td>
                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                <td><div class="btn-group">
                    <button class="btn btn-sm ${u.enabled===false?'btn-primary':'btn-danger'}" onclick="toggleUser(${u.id},${u.enabled===false})" ${isSelf?'disabled':''}>${u.enabled===false?'解封':'封禁'}</button>
                    <button class="btn btn-sm btn-warning" onclick="setRole(${u.id},'${u.role==='admin'?'user':'admin'}')" ${isSelf?'disabled':''}>${u.role==='admin'?'降级':'设管理员'}</button>
                </div></td>
            </tr>`;
        }).join('');
    });
}
function toggleUser(uid,enabled){
    fetch(`/api/admin/users/${uid}/toggle`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({enabled})}).then(r=>r.json()).then(r=>{ loadUsers(); });
}
function setRole(uid,role){
    fetch(`/api/admin/users/${uid}/role`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({role})}).then(r=>r.json()).then(r=>{ loadUsers(); });
}

// ===== 评论管理 =====
function loadComments(){
    fetch("/api/spots/1/comments").then(r=>r.json()).then(()=>{
        // 收集所有评论：遍历每个景点
        fetch("/api/spots?all=1").then(r=>r.json()).then(spotsRes=>{
            const spots = spotsRes.data||[];
            const promises = spots.map(s=>fetch(`/api/spots/${s.id}/comments`).then(r=>r.json()));
            Promise.all(promises).then(results=>{
                let allComments = [];
                results.forEach((r,i)=>{
                    if(r.data) r.data.forEach(c=>{ c._spotName = spots[i]?spots[i].name:''; allComments.push(c); });
                });
                allComments.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
                document.getElementById("commentTable").innerHTML = allComments.map(c=>{
                    let stars=''; for(let i=0;i<(c.rating||5);i++) stars+='★';
                    return `<tr>
                        <td>${c.id}</td><td>${c.username}</td>
                        <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.content}</td>
                        <td style="color:#f5a623;">${stars}</td>
                        <td>${new Date(c.created_at).toLocaleString()}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="delAdminComment(${c.id})">删除</button></td>
                    </tr>`;
                }).join('');
            });
        });
    });
}
function delAdminComment(cid){
    if(!confirm("确定删除该评论？")) return;
    fetch(`/api/admin/comments/${cid}`,{method:"DELETE"}).then(r=>r.json()).then(r=>{ loadComments(); });
}

function loadAll(){ loadSpots(); loadUsers(); loadComments(); }
</script>
</body>
</html>
