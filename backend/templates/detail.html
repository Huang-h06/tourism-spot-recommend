<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>景点详情</title>
    <style>
        body{
            padding:30px;
            max-width:900px;
            margin:0 auto;
        }
        img{
            width:100%;
            max-height:400px;
            object-fit:cover;
            border-radius:8px;
        }
        .info{
            margin-top:20px;
        }
        .back{
            display:inline-block;
            margin-bottom:20px;
            color:#0066cc;
            cursor:pointer;
        }
        .video-block{
            margin-top:30px;
        }
        #videoList{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap:16px;
            margin-top:12px;
        }
        #videoList video{
            width:100%;
            border-radius:6px;
        }
        .comment-block{
            margin-top:35px;
            padding-top:20px;
            border-top:1px solid #e0e0e0;
        }
        .comment-block h3{
            margin-bottom:15px;
        }
        .food-block{
            margin-top:35px;
            padding-top:20px;
            border-top:1px solid #e0e0e0;
        }
        .food-block h3{
            margin-bottom:15px;
        }
        #foodList{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap:14px;
            margin-top:12px;
        }
        #foodList img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            transition:transform 0.2s;
            cursor:pointer;
        }
        #foodList img:hover{
            transform:scale(1.03);
        }
        .comment-form{
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:20px;
        }
        .comment-form input, .comment-form textarea{
            padding:10px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
        }
        .comment-form textarea{
            resize:vertical;
            min-height:80px;
        }
        .comment-form button{
            align-self:flex-start;
            padding:10px 22px;
            border:none;
            border-radius:6px;
            background:#3478f6;
            color:white;
            cursor:pointer;
            font-size:14px;
        }
        .comment-list{
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .comment-item{
            background:#f8f9fa;
            padding:12px 15px;
            border-radius:8px;
        }
        .comment-header{
            display:flex;
            justify-content:space-between;
            margin-bottom:6px;
            font-size:13px;
            color:#666;
        }
        .comment-user{
            font-weight:bold;
            color:#333;
        }
        .comment-content{
            font-size:14px;
            line-height:1.6;
            color:#444;
        }
        .auth-bar{
            position:fixed;
            top:20px;
            right:30px;
            z-index:100;
        }
        .auth-bar button{
            padding:8px 18px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
        }
        .login-btn{
            background:#3478f6;
            color:white;
        }
        .user-info{
            display:flex;
            align-items:center;
            gap:10px;
            background:#fff;
            padding:8px 14px;
            border-radius:6px;
            box-shadow:0 2px 8px #00000012;
            font-size:14px;
        }
        .user-info button{
            background:#ff4d4f;
            color:white;
        }
        .profile-link{
            color:#3478f6;
            cursor:pointer;
            text-decoration:none;
            font-weight:bold;
        }
        .profile-link:hover{ text-decoration:underline; }
        .fav-btn-big{
            display:inline-block;
            padding:10px 22px;
            border:2px solid #ff4d4f;
            border-radius:8px;
            background:#fff;
            color:#ff4d4f;
            cursor:pointer;
            font-size:15px;
            margin-bottom:16px;
            transition:all 0.2s;
        }
        .fav-btn-big:hover{ background:#fff1f0; }
        .fav-btn-big.fav-active{ background:#ff4d4f; color:white; }
        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#00000050;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:200;
        }
        .modal-overlay.show{
            display:flex;
        }
        .modal-box{
            background:#fff;
            padding:28px;
            border-radius:10px;
            width:360px;
            max-width:90%;
        }
        .modal-box h3{
            margin-bottom:18px;
            text-align:center;
        }
        .modal-box input{
            width:100%;
            padding:10px;
            margin-bottom:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
        }
        .modal-box button[type="submit"]{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#3478f6;
            color:white;
            font-size:15px;
            cursor:pointer;
        }
        .modal-box .switch{
            text-align:center;
            margin-top:14px;
            font-size:13px;
            color:#666;
        }
        .modal-box .switch a{
            color:#3478f6;
            cursor:pointer;
            text-decoration:underline;
        }
        .modal-box .close{
            position:absolute;
            top:12px;
            right:16px;
            font-size:22px;
            cursor:pointer;
            color:#999;
        }
    </style>
</head>
<body>
    <div class="auth-bar" id="authBar">
        <button class="login-btn" onclick="openModal()">登录</button>
    </div>
    <div class="modal-overlay" id="authModal">
        <div class="modal-box" style="position:relative;">
            <div class="close" onclick="closeModal()">&times;</div>
            <h3 id="modalTitle">登录</h3>
            <form id="authForm" onsubmit="handleAuth(event)">
                <input type="text" id="authUsername" placeholder="用户名" required>
                <input type="password" id="authPassword" placeholder="密码" required>
                <input type="email" id="authEmail" placeholder="邮箱（选填）" style="display:none;">
                <button type="submit" id="authSubmit">登录</button>
            </form>
            <div class="switch" id="modalSwitch">
                还没有账号？<a onclick="switchToRegister()">去注册</a>
            </div>
        </div>
    </div>
    <div class="back" onclick="history.back()">&lt;&lt; 返回列表</div>
    <div class="fav-bar" id="favBar"></div>
    <div id="content"></div>
    <div class="video-block">
        <h3>相关景点视频</h3>
        <div id="videoList"></div>
    </div>
    <div class="food-block">
        <h3>城市美食</h3>
        <div id="foodList"></div>
    </div>
    <div class="comment-block">
        <h3>游客评论</h3>
        <div class="comment-form" id="commentForm">
            <div id="currentUser" style="display:none;font-size:14px;color:#333;">
                当前用户：<strong id="currentUserName"></strong>
            </div>
            <input type="text" id="username" placeholder="你的昵称" maxlength="50">
            <textarea id="commentContent" placeholder="写下你的评论..." maxlength="500"></textarea>
            <button onclick="submitComment()">发表评论</button>
        </div>
        <div class="comment-list" id="commentList"></div>
    </div>
    <script>
        // 中文名与图片文件名映射
        const imgMap = {"西湖":"xihu","故宫":"gugong","张家界":"zhangjiajie","鼓浪屿":"gulangyu","丽江":"lijiang","西藏":"xizang","新疆":"xinjiang","成都":"chengdu","重庆":"chongqing","青岛":"qingdao","上海":"shanghai","南京":"nanjing"};
        // 获取地址栏id
        const params = new URLSearchParams(location.search);
        const sid = params.get("id");

        // 记录浏览
        const user = JSON.parse(localStorage.getItem("user") || "null");
        if(user && sid){
            fetch("/api/history", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({user_id:user.id, spot_id:parseInt(sid)})
            });
        }

        fetch(`/api/spots/${sid}`)
        .then(res=>res.json())
        .then(result=>{
            let item = result.data;
            let html = `
                <img src="static/images/${imgMap[item.name]}.jpg">
                <div class="info">
                    <h2>${item.name}</h2>
                    <p>城市：${item.city}</p>
                    <p>等级：${item.level}</p>
                    <p>标签：${item.tag}</p>
                    <p style="margin-top:15px;line-height:1.7;">简介：${item.desc}</p>
                </div>
            `
            document.getElementById("content").innerHTML = html;
            // 加载收藏按钮
            loadFavBtn();
        })

        // 收藏按钮
        function loadFavBtn(){
            if(!user) return;
            const favBar = document.getElementById("favBar");
            fetch(`/api/favorites/check?user_id=${user.id}&spot_id=${sid}`)
            .then(res=>res.json())
            .then(r=>{
                if(r.data){
                    favBar.innerHTML = `<button class="fav-btn-big fav-active" onclick="toggleFav()">❤️ 已收藏</button>`;
                }else{
                    favBar.innerHTML = `<button class="fav-btn-big" onclick="toggleFav()">🤍 收藏</button>`;
                }
            });
        }
        function toggleFav(){
            if(!user){ alert("请先登录"); return; }
            const btn = document.querySelector(".fav-btn-big");
            const isFav = btn.classList.contains("fav-active");
            if(isFav){
                fetch(`/api/favorites?user_id=${user.id}&spot_id=${sid}`, {method:"DELETE"})
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){
                        btn.textContent="🤍 收藏";
                        btn.classList.remove("fav-active");
                    }
                });
            }else{
                fetch("/api/favorites", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({user_id:user.id, spot_id:parseInt(sid)})
                })
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){
                        btn.textContent="❤️ 已收藏";
                        btn.classList.add("fav-active");
                    }
                });
            }
        }

        // 加载关联视频
        fetch(`/api/spots/${sid}/videos`)
        .then(res=>res.json())
        .then(videoRes=>{
            const vBox = document.getElementById("videoList");
            if(!videoRes.data || videoRes.data.length === 0){
                vBox.innerHTML = "<p>暂无相关视频</p>";
                return;
            }
            videoRes.data.forEach(v=>{
                vBox.innerHTML += `
                    <video controls preload="none">
                        <source src="${v.url}" type="video/mp4">
                    </video>
                `
            })
        })
        // 加载美食图片
        fetch(`/api/spots/${sid}/foods`)
        .then(res=>res.json())
        .then(foodRes=>{
            const fBox = document.getElementById("foodList");
            if(!foodRes.data || foodRes.data.length === 0){
                fBox.innerHTML = "<p>暂无相关美食图片</p>";
                return;
            }
            fBox.innerHTML = foodRes.data.map(f=>`
                <img src="${f.url}" alt="城市美食" onclick="window.open('${f.url}','_blank')">
            `).join("");
        })

        // 加载评论

        function loadComments(){
            fetch(`/api/spots/${sid}/comments`)
            .then(res=>res.json())
            .then(result=>{
                const listBox = document.getElementById("commentList");
                const data = result.data || [];
                if(data.length === 0){
                    listBox.innerHTML = "<p>暂无评论，快来发表第一条吧~</p>";
                    return;
                }
                listBox.innerHTML = data.map(c=>`
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-user">${c.username}</span>
                            <span>${new Date(c.created_at).toLocaleString()}</span>
                        </div>
                        <div class="comment-content">${c.content}</div>
                    </div>
                `).join("");
            })
        }
        // 提交评论
        function submitComment(){
            const user = JSON.parse(localStorage.getItem("user") || "null");
            const username = user ? user.username : document.getElementById("username").value.trim();
            const content = document.getElementById("commentContent").value.trim();
            if(!username){ alert("请输入昵称"); return; }
            if(!content){ alert("请输入评论内容"); return; }
            const body = {username, content};
            if(user) body.user_id = user.id;
            fetch(`/api/spots/${sid}/comments`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            })
            .then(res=>res.json())
            .then(result=>{
                if(result.code === 200){
                    document.getElementById("commentContent").value = "";
                    loadComments();
                }else{
                    alert(result.msg || "评论失败");
                }
            })
        }
        loadComments();
        updateCommentFormUser();

        // ========== 登录注册 ==========
        let isRegister = false;
        updateAuthBar();

        function updateCommentFormUser(){
            const user = JSON.parse(localStorage.getItem("user") || "null");
            if(user){
                document.getElementById("currentUser").style.display = "block";
                document.getElementById("currentUserName").textContent = user.username;
                document.getElementById("username").style.display = "none";
            }else{
                document.getElementById("currentUser").style.display = "none";
                document.getElementById("username").style.display = "block";
            }
        }

        function updateAuthBar(){
            const bar = document.getElementById("authBar");
            const user = JSON.parse(localStorage.getItem("user") || "null");
            if(user){
                bar.innerHTML = `
                    <div class="user-info">
                        <a class="profile-link" href="/profile">${user.username}</a>
                        <button onclick="logout()">退出</button>
                    </div>
                `;
            }else{
                bar.innerHTML = `<button class="login-btn" onclick="openModal()">登录</button>`;
            }
        }

        function openModal(){
            document.getElementById("authModal").classList.add("show");
        }
        function closeModal(){
            document.getElementById("authModal").classList.remove("show");
        }
        function switchToRegister(){
            isRegister = true;
            document.getElementById("modalTitle").textContent = "注册";
            document.getElementById("authSubmit").textContent = "注册";
            document.getElementById("authEmail").style.display = "block";
            document.getElementById("modalSwitch").innerHTML = `已有账号？<a onclick="switchToLogin()">去登录</a>`;
        }
        function switchToLogin(){
            isRegister = false;
            document.getElementById("modalTitle").textContent = "登录";
            document.getElementById("authSubmit").textContent = "登录";
            document.getElementById("authEmail").style.display = "none";
            document.getElementById("modalSwitch").innerHTML = `还没有账号？<a onclick="switchToRegister()">去注册</a>`;
        }
        function handleAuth(e){
            e.preventDefault();
            const username = document.getElementById("authUsername").value.trim();
            const password = document.getElementById("authPassword").value;
            const email = document.getElementById("authEmail").value.trim();
            const url = isRegister ? "/api/register" : "/api/login";
            const body = isRegister ? {username, password, email} : {username, password};
            fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            })
            .then(res=>res.json())
            .then(result=>{
                if(result.code === 200){
                    if(!isRegister){
                        localStorage.setItem("user", JSON.stringify(result.data));
                        updateAuthBar();
                        updateCommentFormUser();
                        loadFavBtn();
                        closeModal();
                    }else{
                        alert("注册成功，请登录");
                        switchToLogin();
                    }
                }else{
                    alert(result.msg || (isRegister ? "注册失败" : "登录失败"));
                }
            })
        }
        function logout(){
            localStorage.removeItem("user");
            updateAuthBar();
            updateCommentFormUser();
        }
        document.getElementById("authModal").addEventListener("click", (e)=>{
            if(e.target.id === "authModal") closeModal();
        });
    </script>
</body>
</html>
