<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>景点详情</title>
    <style>
        body{
            padding:30px;
            max-width:900px;
            margin:0 auto;
        }
        img{
            width:100%;
            max-height:400px;
            object-fit:cover;
            border-radius:8px;
        }
        .info{
            margin-top:20px;
        }
        .back{
            display:inline-block;
            margin-bottom:20px;
            color:#0066cc;
            cursor:pointer;
        }
        .video-block{
            margin-top:30px;
        }
        #videoList{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap:16px;
            margin-top:12px;
        }
        #videoList video{
            width:100%;
            border-radius:6px;
        }
        .comment-block{
            margin-top:35px;
            padding-top:20px;
            border-top:1px solid #e0e0e0;
        }
        .comment-block h3{
            margin-bottom:15px;
        }
        .comment-form{
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:20px;
        }
        .comment-form input, .comment-form textarea{
            padding:10px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
        }
        .comment-form textarea{
            resize:vertical;
            min-height:80px;
        }
        .comment-form button{
            align-self:flex-start;
            padding:10px 22px;
            border:none;
            border-radius:6px;
            background:#3478f6;
            color:white;
            cursor:pointer;
            font-size:14px;
        }
        .comment-list{
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .comment-item{
            background:#f8f9fa;
            padding:12px 15px;
            border-radius:8px;
        }
        .comment-header{
            display:flex;
            justify-content:space-between;
            margin-bottom:6px;
            font-size:13px;
            color:#666;
        }
        .comment-user{
            font-weight:bold;
            color:#333;
        }
        .comment-content{
            font-size:14px;
            line-height:1.6;
            color:#444;
        }
    </style>
</head>
<body>
    <div class="back" onclick="history.back()"><< 返回列表</div>
    <div id="content"></div>
    <div class="video-block">
        <h3>相关景点视频</h3>
        <div id="videoList"></div>
    </div>
    <div class="comment-block">
        <h3>游客评论</h3>
        <div class="comment-form">
            <input type="text" id="username" placeholder="你的昵称" maxlength="50">
            <textarea id="commentContent" placeholder="写下你的评论..." maxlength="500"></textarea>
            <button onclick="submitComment()">发表评论</button>
        </div>
        <div class="comment-list" id="commentList"></div>
    </div>
    <script>
        // 中文名与图片文件名映射
        const imgMap = {"西湖":"xihu","故宫":"gugong","张家界":"zhangjiajie","鼓浪屿":"gulangyu","丽江":"lijiang","西藏":"xizang","新疆":"xinjiang","成都":"chengdu","重庆":"chongqing","青岛":"qingdao"};
        // 获取地址栏id
        const params = new URLSearchParams(location.search);
        const sid = params.get("id");
        fetch(`/api/spots/${sid}`)
        .then(res=>res.json())
        .then(result=>{
            let item = result.data;
            let html = `
                <img src="static/images/${imgMap[item.name]}.jpg">
                <div class="info">
                    <h2>${item.name}</h2>
                    <p>城市：${item.city}</p>
                    <p>等级：${item.level}</p>
                    <p>标签：${item.tag}</p>
                    <p style="margin-top:15px;line-height:1.7;">简介：${item.desc}</p>
                </div>
            `
            document.getElementById("content").innerHTML = html;
        })
        // 加载关联视频
        fetch(`/api/spots/${sid}/videos`)
        .then(res=>res.json())
        .then(videoRes=>{
            const vBox = document.getElementById("videoList");
            if(!videoRes.data || videoRes.data.length === 0){
                vBox.innerHTML = "<p>暂无相关视频</p>";
                return;
            }
            videoRes.data.forEach(v=>{
                vBox.innerHTML += `
                    <video controls preload="none">
                        <source src="${v.url}" type="video/mp4">
                    </video>
                `
            })
        })
        // 加载评论
        function loadComments(){
            fetch(`/api/spots/${sid}/comments`)
            .then(res=>res.json())
            .then(result=>{
                const listBox = document.getElementById("commentList");
                const data = result.data || [];
                if(data.length === 0){
                    listBox.innerHTML = "<p>暂无评论，快来发表第一条吧~</p>";
                    return;
                }
                listBox.innerHTML = data.map(c=>`
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-user">${c.username}</span>
                            <span>${new Date(c.created_at).toLocaleString()}</span>
                        </div>
                        <div class="comment-content">${c.content}</div>
                    </div>
                `).join("");
            })
        }
        // 提交评论
        function submitComment(){
            const username = document.getElementById("username").value.trim();
            const content = document.getElementById("commentContent").value.trim();
            if(!username){ alert("请输入昵称"); return; }
            if(!content){ alert("请输入评论内容"); return; }
            fetch(`/api/spots/${sid}/comments`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, content})
            })
            .then(res=>res.json())
            .then(result=>{
                if(result.code === 200){
                    document.getElementById("commentContent").value = "";
                    loadComments();
                }else{
                    alert(result.msg || "评论失败");
                }
            })
        }
        loadComments();
    </script>
</body>
</html>
