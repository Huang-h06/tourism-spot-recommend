<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>旅游景点推荐系统</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f5f7fa;
            padding: 30px;
        }
        h1{
            text-align: center;
            color:#222;
            margin-bottom: 25px;
        }

        .container{
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:24px;
        }
        .spot-card{
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px #00000015;
            position:relative;
            cursor:pointer;
        }
        .spot-card img{
            width:100%;
            height:180px;
            object-fit: cover;
        }
        .info{
            padding:16px;
        }
        .name{
            font-size:18px;
            font-weight:bold;
            margin-bottom:8px;
        }
        .city,.level,.tag{
            font-size:14px;
            color:#555;
            margin:4px 0;
        }
        .desc{
            margin-top:10px;
            font-size:13px;
            color:#666;
        }
        .search-box{
            max-width: 1200px;
            margin:0 auto 30px;
            display: flex;
            gap:12px;
            align-items: center;
        }
        .search-box input{
            padding:10px 14px;
            flex:1;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
        }
        .search-box button{
            padding:10px 22px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:#3478f6;
            color:white;
        }
        #resetBtn{
            background:#888;
        }
        .auth-bar{
            position:fixed;
            top:20px;
            right:30px;
            z-index:100;
        }
        .auth-bar button{
            padding:8px 18px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
        }
        .login-btn{
            background:#3478f6;
            color:white;
        }
        .user-info{
            display:flex;
            align-items:center;
            gap:10px;
            background:#fff;
            padding:8px 14px;
            border-radius:6px;
            box-shadow:0 2px 8px #00000012;
            font-size:14px;
        }
        .user-info button{
            background:#ff4d4f;
            color:white;
        }
        .profile-link{
            color:#3478f6;
            cursor:pointer;
            text-decoration:none;
            font-weight:bold;
        }
        .profile-link:hover{ text-decoration:underline; }
        .fav-btn{
            position:absolute;
            top:10px;
            right:10px;
            background:rgba(255,255,255,0.9);
            border:none;
            border-radius:50%;
            width:36px;
            height:36px;
            font-size:18px;
            cursor:pointer;
            z-index:5;
            box-shadow:0 2px 6px rgba(0,0,0,0.15);
            display:flex;
            align-items:center;
            justify-content:center;
            transition:transform 0.2s;
        }
        .fav-btn:hover{ transform:scale(1.15); }
        .fav-btn.fav-active{ background:#ff4d4f; }
        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#00000050;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:200;
        }
        .modal-overlay.show{
            display:flex;
        }
        .modal-box{
            background:#fff;
            padding:28px;
            border-radius:10px;
            width:360px;
            max-width:90%;
        }
        .modal-box h3{
            margin-bottom:18px;
            text-align:center;
        }
        .modal-box input{
            width:100%;
            padding:10px;
            margin-bottom:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
        }
        .modal-box button[type="submit"]{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#3478f6;
            color:white;
            font-size:15px;
            cursor:pointer;
        }
        .modal-box .switch{
            text-align:center;
            margin-top:14px;
            font-size:13px;
            color:#666;
        }
        .modal-box .switch a{
            color:#3478f6;
            cursor:pointer;
            text-decoration:underline;
        }
        .modal-box .close{
            position:absolute;
            top:12px;
            right:16px;
            font-size:22px;
            cursor:pointer;
            color:#999;
        }
    </style>
</head>
<body>
    <div class="auth-bar" id="authBar">
        <button class="login-btn" onclick="openModal()">登录</button>
    </div>
    <div class="modal-overlay" id="authModal">
        <div class="modal-box" style="position:relative;">
            <div class="close" onclick="closeModal()">&times;</div>
            <h3 id="modalTitle">登录</h3>
            <form id="authForm" onsubmit="handleAuth(event)">
                <input type="text" id="authUsername" placeholder="用户名" required>
                <input type="password" id="authPassword" placeholder="密码" required>
                <input type="email" id="authEmail" placeholder="邮箱（选填）" style="display:none;">
                <button type="submit" id="authSubmit">登录</button>
            </form>
            <div class="switch" id="modalSwitch">
                还没有账号？<a onclick="switchToRegister()">去注册</a>
            </div>
        </div>
    </div>
    <h1>热门旅游景点推荐</h1>


    <div class="search-box">
        <input type="text" id="cityInput" placeholder="输入城市筛选">
        <input type="text" id="tagInput" placeholder="输入标签筛选，例如：自然风光">
        <button id="searchBtn">搜索筛选</button>
        <button id="resetBtn">重置</button>
    </div>
    <div class="container" id="list"></div>

    <script>
        // 中文名与图片文件名映射
        const imgMap = {"西湖":"xihu","故宫":"gugong","张家界":"zhangjiajie","鼓浪屿":"gulangyu","丽江":"lijiang","西藏":"xizang","新疆":"xinjiang","成都":"chengdu","重庆":"chongqing","青岛":"qingdao","上海":"shanghai","南京":"nanjing"};



        function loadData(city="",tag=""){
            let url = `/api/spots?city=${city}&tag=${tag}`
            fetch(url)
            .then(res=>res.json())
            .then(result=>{
                const data = result.data;
                const box = document.getElementById("list");
                box.innerHTML = "";
                data.forEach(item=>{
                    let card = `
                    <div class="spot-card" data-id="${item.id}" onclick="goDetail(event,${item.id})">
                        <button class="fav-btn" data-spot="${item.id}" onclick="event.stopPropagation();toggleFav(${item.id})">🤍</button>
                        <img src="static/images/${imgMap[item.name]}.jpg" alt="${item.name}">
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="city">城市：${item.city}</div>
                            <div class="level">等级：${item.level}</div>
                            <div class="tag">标签：${item.tag}</div>
                            <div class="desc">简介：${item.desc}</div>
                        </div>
                    </div>
                    `
                    box.innerHTML += card;
                });
                // 渲染完卡片后标记已收藏
                if(user) markFavs(data);
            })
        }
        // 页面初次加载
        loadData();

        // 标记已收藏的卡片
        function markFavs(spots){
            spots.forEach(item=>{
                fetch(`/api/favorites/check?user_id=${user.id}&spot_id=${item.id}`)
                .then(res=>res.json())
                .then(r=>{
                    if(r.data){
                        const btn = document.querySelector(`.fav-btn[data-spot="${item.id}"]`);
                        if(btn){ btn.textContent = "❤️"; btn.classList.add("fav-active"); }
                    }
                });
            });
        }

        // 收藏/取消收藏
        function toggleFav(spotId){
            if(!user){ alert("请先登录"); openModal(); return; }
            const btn = document.querySelector(`.fav-btn[data-spot="${spotId}"]`);
            const isFav = btn.classList.contains("fav-active");
            if(isFav){
                fetch(`/api/favorites?user_id=${user.id}&spot_id=${spotId}`, {method:"DELETE"})
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){
                        btn.textContent="🤍";
                        btn.classList.remove("fav-active");
                    }
                });
            }else{
                fetch("/api/favorites", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({user_id:user.id, spot_id:spotId})
                })
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){
                        btn.textContent="❤️";
                        btn.classList.add("fav-active");
                    }
                });
            }
        }

        function goDetail(e, id){
            if(user){
                fetch("/api/history", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({user_id:user.id, spot_id:id})
                });
            }
            location.href = `/detail?id=${id}`;
        }

        // 搜索按钮事件
        document.getElementById("searchBtn").addEventListener("click",()=>{
            let city = document.getElementById("cityInput").value
            let tag = document.getElementById("tagInput").value
            loadData(city,tag)
        })
        document.getElementById("resetBtn").addEventListener("click",()=>{
            document.getElementById("cityInput").value=""
            document.getElementById("tagInput").value=""
            loadData()
        })

        // ========== 登录注册 ==========
        let isRegister = false;
        const user = JSON.parse(localStorage.getItem("user") || "null");
        updateAuthBar();

        function updateAuthBar(){
            const bar = document.getElementById("authBar");
            if(user){
                bar.innerHTML = `
                    <div class="user-info">
                        <a class="profile-link" href="/profile">${user.username}</a>
                        <button onclick="logout()">退出</button>
                    </div>
                `;
            }else{
                bar.innerHTML = `<button class="login-btn" onclick="openModal()">登录</button>`;
            }
        }

        function openModal(){
            document.getElementById("authModal").classList.add("show");
        }
        function closeModal(){
            document.getElementById("authModal").classList.remove("show");
        }
        function switchToRegister(){
            isRegister = true;
            document.getElementById("modalTitle").textContent = "注册";
            document.getElementById("authSubmit").textContent = "注册";
            document.getElementById("authEmail").style.display = "block";
            document.getElementById("modalSwitch").innerHTML = `已有账号？<a onclick="switchToLogin()">去登录</a>`;
        }
        function switchToLogin(){
            isRegister = false;
            document.getElementById("modalTitle").textContent = "登录";
            document.getElementById("authSubmit").textContent = "登录";
            document.getElementById("authEmail").style.display = "none";
            document.getElementById("modalSwitch").innerHTML = `还没有账号？<a onclick="switchToRegister()">去注册</a>`;
        }
        function handleAuth(e){
            e.preventDefault();
            const username = document.getElementById("authUsername").value.trim();
            const password = document.getElementById("authPassword").value;
            const email = document.getElementById("authEmail").value.trim();
            const url = isRegister ? "/api/register" : "/api/login";
            const body = isRegister ? {username, password, email} : {username, password};
            fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            })
            .then(res=>res.json())
            .then(result=>{
                if(result.code === 200){
                    if(!isRegister){
                        localStorage.setItem("user", JSON.stringify(result.data));
                        location.reload();
                    }else{
                        alert("注册成功，请登录");
                        switchToLogin();
                    }
                }else{
                    alert(result.msg || (isRegister ? "注册失败" : "登录失败"));
                }
            })
        }
        function logout(){
            localStorage.removeItem("user");
            location.reload();
        }
        document.getElementById("authModal").addEventListener("click", (e)=>{
            if(e.target.id === "authModal") closeModal();
        });
    </script>
</body>
</html>
