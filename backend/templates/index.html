<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>旅游景点推荐系统</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f5f7fa;
            padding: 30px;
        }
        h1{
            text-align: center;
            color:#222;
            margin-bottom: 40px;
        }
        .container{
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:24px;
        }
        .spot-card{
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px #00000015;
        }
        .spot-card img{
            width:100%;
            height:180px;
            object-fit: cover;
        }
        .info{
            padding:16px;
        }
        .name{
            font-size:18px;
            font-weight:bold;
            margin-bottom:8px;
        }
        .city,.level,.tag{
            font-size:14px;
            color:#555;
            margin:4px 0;
        }
        .desc{
            margin-top:10px;
            font-size:13px;
            color:#666;
        }
        .search-box{
            max-width: 1200px;
            margin:0 auto 30px;
            display: flex;
            gap:12px;
            align-items: center;
        }
        .search-box input{
            padding:10px 14px;
            flex:1;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
        }
        .search-box button{
            padding:10px 22px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:#3478f6;
            color:white;
        }
        #resetBtn{
            background:#888;
        }
    </style>
</head>
<body>
    <h1>热门旅游景点推荐</h1>
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="输入城市筛选">
        <input type="text" id="tagInput" placeholder="输入标签筛选，例如：自然风光">
        <button id="searchBtn">搜索筛选</button>
        <button id="resetBtn">重置</button>
    </div>
    <div class="container" id="list"></div>

    <script>
        // 中文名与图片文件名映射
        const imgMap = {"西湖":"xihu","故宫":"gugong","张家界":"zhangjiajie","鼓浪屿":"gulangyu","丽江":"lijiang","西藏":"xizang","新疆":"xinjiang"};

        function loadData(city="",tag=""){
            let url = `/api/spots?city=${city}&tag=${tag}`
            fetch(url)
            .then(res=>res.json())
            .then(result=>{
                const data = result.data;
                const box = document.getElementById("list");
                box.innerHTML = "";
                data.forEach(item=>{
                    let card = `
                    <div class="spot-card" data-id="${item.id}" onclick="location.href='/detail?id=${item.id}'">
                        <img src="static/images/${imgMap[item.name]}.jpg" alt="${item.name}">
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="city">城市：${item.city}</div>
                            <div class="level">等级：${item.level}</div>
                            <div class="tag">标签：${item.tag}</div>
                            <div class="desc">简介：${item.desc}</div>
                        </div>
                    </div>
                    `
                    box.innerHTML += card;
                })
            })
        }
        // 页面初次加载
        loadData();

        // 搜索按钮事件
        document.getElementById("searchBtn").addEventListener("click",()=>{
            let city = document.getElementById("cityInput").value
            let tag = document.getElementById("tagInput").value
            loadData(city,tag)
        })
        document.getElementById("resetBtn").addEventListener("click",()=>{
            document.getElementById("cityInput").value=""
            document.getElementById("tagInput").value=""
            loadData()
        })
    </script>
</body>
</html>
