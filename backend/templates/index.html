<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>旅游景点推荐系统</title>
    <style>
        *{ margin: 0; padding: 0; box-sizing: border-box; }
        body{
            background-color: #f5f7fa;
            padding: 0 0 30px;
        }

        /* ===== 轮播 Banner ===== */
        .banner-wrap{
            width:100%;
            height:360px;
            position:relative;
            overflow:hidden;
            margin-bottom:30px;
        }
        .banner-slide{
            width:100%;
            height:100%;
            position:absolute;
            top:0; left:0;
            opacity:0;
            transition:opacity 0.8s ease;
            cursor:pointer;
        }
        .banner-slide.active{ opacity:1; z-index:1; }
        .banner-slide img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .banner-text{
            position:absolute;
            bottom:50px; left:60px;
            color:#fff;
            text-shadow:0 2px 12px rgba(0,0,0,0.6);
            z-index:2;
        }
        .banner-text h2{
            font-size:36px;
            margin-bottom:8px;
        }
        .banner-text p{
            font-size:16px;
            opacity:0.9;
        }
        .banner-dots{
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:10px;
            z-index:3;
        }
        .banner-dot{
            width:12px; height:12px;
            border-radius:50%;
            background:rgba(255,255,255,0.5);
            cursor:pointer;
            transition:all 0.3s;
        }
        .banner-dot.active{
            background:#fff;
            width:28px;
            border-radius:6px;
        }
        .banner-arrow{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            z-index:3;
            width:44px;
            height:44px;
            border-radius:50%;
            background:rgba(255,255,255,0.25);
            color:#fff;
            font-size:22px;
            border:none;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:background 0.3s;
        }
        .banner-arrow:hover{ background:rgba(255,255,255,0.45); }
        .banner-arrow.left{ left:20px; }
        .banner-arrow.right{ right:20px; }

        h1{
            text-align: center;
            color:#222;
            margin-bottom: 8px;
        }
        .subtitle{
            text-align:center;
            color:#888;
            font-size:14px;
            margin-bottom:25px;
        }

        .container{
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:24px;
        }
        .spot-card{
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px #00000015;
            position:relative;
            cursor:pointer;
            transition:transform 0.2s,box-shadow 0.2s;
        }
        .spot-card:hover{ transform:translateY(-4px); box-shadow:0 6px 20px rgba(0,0,0,0.12); }
        .spot-card img{
            width:100%;
            height:180px;
            object-fit: cover;
        }
        .info{
            padding:16px;
        }
        .name-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:8px;
        }
        .name{
            font-size:18px;
            font-weight:bold;
        }
        .avg-star{
            color:#f5a623;
            font-size:14px;
            white-space:nowrap;
        }
        .avg-star span{
            color:#999;
            font-size:12px;
            margin-left:2px;
        }
        .city,.level,.tag{
            font-size:14px;
            color:#555;
            margin:4px 0;
        }
        .desc{
            margin-top:10px;
            font-size:13px;
            color:#666;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        .search-box{
            max-width: 1200px;
            margin:0 auto 30px;
            display: flex;
            gap:12px;
            align-items: center;
        }
        .search-box input{
            padding:10px 14px;
            flex:1;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
        }
        .search-box button{
            padding:10px 22px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:#3478f6;
            color:white;
        }
        #resetBtn{ background:#888; }
        .auth-bar{
            position:fixed;
            top:20px;
            right:30px;
            z-index:100;
        }
        .auth-bar button{
            padding:8px 18px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
        }
        .login-btn{ background:#3478f6; color:white; }
        .user-info{
            display:flex;
            align-items:center;
            gap:10px;
            background:#fff;
            padding:8px 14px;
            border-radius:6px;
            box-shadow:0 2px 8px #00000012;
            font-size:14px;
        }
        .user-info button{ background:#ff4d4f; color:white; }
        .profile-link{
            color:#3478f6;
            cursor:pointer;
            text-decoration:none;
            font-weight:bold;
        }
        .profile-link:hover{ text-decoration:underline; }
        .fav-btn{
            position:absolute;
            top:10px;
            right:10px;
            background:rgba(255,255,255,0.9);
            border:none;
            border-radius:50%;
            width:36px;
            height:36px;
            font-size:18px;
            cursor:pointer;
            z-index:5;
            box-shadow:0 2px 6px rgba(0,0,0,0.15);
            display:flex;
            align-items:center;
            justify-content:center;
            transition:transform 0.2s;
        }
        .fav-btn:hover{ transform:scale(1.15); }
        .fav-btn.fav-active{ background:#ff4d4f; }
        .modal-overlay{
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:#00000050;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:200;
        }
        .modal-overlay.show{ display:flex; }
        .modal-box{
            background:#fff;
            padding:28px;
            border-radius:10px;
            width:360px;
            max-width:90%;
        }
        .modal-box h3{ margin-bottom:18px; text-align:center; }
        .modal-box input{
            width:100%;
            padding:10px;
            margin-bottom:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
        }
        .modal-box button[type="submit"]{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#3478f6;
            color:white;
            font-size:15px;
            cursor:pointer;
        }
        .modal-box .switch{
            text-align:center;
            margin-top:14px;
            font-size:13px;
            color:#666;
        }
        .modal-box .switch a{
            color:#3478f6;
            cursor:pointer;
            text-decoration:underline;
        }
        .modal-box .close{
            position:absolute;
            top:12px; right:16px;
            font-size:22px;
            cursor:pointer;
            color:#999;
        }

        @media (max-width:900px){
            .container{ grid-template-columns: repeat(2,1fr); }
            .banner-wrap{ height:240px; }
            .banner-text{ left:30px; bottom:40px; }
            .banner-text h2{ font-size:24px; }
        }
        @media (max-width:540px){
            .container{ grid-template-columns: 1fr; }
            .banner-wrap{ height:180px; }
            .banner-text{ left:20px; bottom:30px; }
            .banner-text h2{ font-size:18px; }
        }
    </style>
</head>
<body>
    <div class="auth-bar" id="authBar">
        <button class="login-btn" onclick="openModal()">登录</button>
    </div>
    <div class="modal-overlay" id="authModal">
        <div class="modal-box" style="position:relative;">
            <div class="close" onclick="closeModal()">&times;</div>
            <h3 id="modalTitle">登录</h3>
            <form id="authForm" onsubmit="handleAuth(event)">
                <input type="text" id="authUsername" placeholder="用户名" required>
                <input type="password" id="authPassword" placeholder="密码" required>
                <input type="email" id="authEmail" placeholder="邮箱（选填）" style="display:none;">
                <button type="submit" id="authSubmit">登录</button>
            </form>
            <div class="switch" id="modalSwitch">
                还没有账号？<a onclick="switchToRegister()">去注册</a>
            </div>
        </div>
    </div>

    <!-- 轮播 Banner（动态生成所有景点） -->
    <div class="banner-wrap" id="bannerWrap">
        <div class="banner-loading" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;">加载中...</div>
        <button class="banner-arrow left" onclick="bannerPrev(event)">&#10094;</button>
        <button class="banner-arrow right" onclick="bannerNext(event)">&#10095;</button>
        <div class="banner-dots" id="bannerDots"></div>
    </div>

    <h1>热门旅游景点推荐</h1>
    <p class="subtitle">发现中国最美风景 · 规划你的下一段旅程</p>

    <div style="max-width:1200px;margin:0 auto 22px;display:flex;gap:12px;justify-content:center;">
        <a href="/notes" style="text-decoration:none;background:#fff;color:#3478f6;padding:8px 20px;border-radius:20px;font-size:14px;box-shadow:0 1px 6px rgba(0,0,0,0.08);">📝 游记广场</a>
        <a href="/admin" style="text-decoration:none;background:#fff;color:#666;padding:8px 20px;border-radius:20px;font-size:14px;box-shadow:0 1px 6px rgba(0,0,0,0.08);">⚙️ 管理后台</a>
    </div>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="输入城市筛选">
        <input type="text" id="tagInput" placeholder="输入标签筛选，例如：自然风光">
        <button id="searchBtn">搜索筛选</button>
        <button id="resetBtn">重置</button>
    </div>
    <div class="container" id="list"></div>

    <script>
        // 中文名与图片文件名映射
        const imgMap = {"西湖":"xihu","故宫":"gugong","张家界":"zhangjiajie","鼓浪屿":"gulangyu","丽江":"lijiang","西藏":"xizang","新疆":"xinjiang","成都":"chengdu","重庆":"chongqing","青岛":"qingdao","上海":"shanghai","南京":"nanjing"};

        // 景点标语映射
        const sloganMap = {
            "西湖":"人间天堂，诗画江南",
            "故宫":"六百年皇家宫殿，世界文化遗产",
            "张家界":"奇峰林立，鬼斧神工",
            "鼓浪屿":"海上花园，钢琴之岛",
            "丽江":"邂逅柔软时光，梦回茶马古道",
            "西藏":"世界屋脊，心灵净土",
            "新疆":"大美新疆，辽阔无疆",
            "成都":"天府之国，美食之都",
            "重庆":"山城雾都，火锅之城",
            "青岛":"红瓦绿树，碧海蓝天",
            "上海":"东方明珠，摩登之都",
            "南京":"六朝古都，十朝都会"
        };

        // ========== 轮播 Banner（动态从API加载所有景点） ==========
        let bannerIdx = 0;
        let bannerTimer = null;
        let bannerSlides = [];
        let bannerDots = [];
        let bannerTotal = 0;

        function buildBanner(spots){
            const wrap = document.getElementById("bannerWrap");
            // 清空之前的加载提示和旧幻灯片
            const oldSlides = wrap.querySelectorAll(".banner-slide");
            oldSlides.forEach(s=>s.remove());
            const loading = wrap.querySelector(".banner-loading");
            if(loading) loading.remove();

            spots.forEach((item, i) => {
                const slide = document.createElement("div");
                slide.className = "banner-slide" + (i===0?" active":"");
                slide.setAttribute("data-spot", item.id);
                slide.onclick = ()=>goBanner(item.id);
                const imgFile = imgMap[item.name] || "default";
                slide.innerHTML = `
                    <img src="static/images/${imgFile}.jpg" alt="${item.name}">
                    <div class="banner-text"><h2>${item.city} · ${item.name}</h2><p>${sloganMap[item.name] || item.desc || ''}</p></div>
                `;
                wrap.insertBefore(slide, wrap.querySelector(".banner-arrow"));
            });

            bannerSlides = wrap.querySelectorAll(".banner-slide");
            bannerTotal = bannerSlides.length;

            // 创建圆点
            const dotsBox = document.getElementById("bannerDots");
            dotsBox.innerHTML = "";
            for(let i=0; i<bannerTotal; i++){
                const dot = document.createElement("span");
                dot.className = "banner-dot" + (i===0?" active":"");
                dot.onclick = (e)=>{ e.stopPropagation(); goBannerSlide(i); };
                dotsBox.appendChild(dot);
            }
            bannerDots = dotsBox.querySelectorAll(".banner-dot");

            if(bannerTotal > 0){
                bannerTimer = setInterval(()=>{ goBannerSlide((bannerIdx+1)%bannerTotal); }, 4000);
            }
        }

        function goBannerSlide(idx){
            if(bannerTotal === 0) return;
            bannerSlides[bannerIdx].classList.remove("active");
            bannerDots[bannerIdx].classList.remove("active");
            bannerIdx = idx;
            bannerSlides[bannerIdx].classList.add("active");
            bannerDots[bannerIdx].classList.add("active");
        }
        function bannerNext(e){ e.stopPropagation(); if(bannerTotal===0)return; goBannerSlide((bannerIdx+1)%bannerTotal); resetBannerTimer(); }
        function bannerPrev(e){ e.stopPropagation(); if(bannerTotal===0)return; goBannerSlide((bannerIdx-1+bannerTotal)%bannerTotal); resetBannerTimer(); }
        function resetBannerTimer(){
            clearInterval(bannerTimer);
            if(bannerTotal > 0){
                bannerTimer = setInterval(()=>{ goBannerSlide((bannerIdx+1)%bannerTotal); }, 4000);
            }
        }
        function goBanner(spotId){
            if(user){
                fetch("/api/history",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:user.id,spot_id:spotId})});
            }
            location.href = `/detail?id=${spotId}`;
        }

        // ========== 渲染星级 ==========
        function renderStars(avg, count){
            if(!avg || avg===0) return '<span style="color:#ccc;font-size:14px;">暂无评分</span>';
            const full = Math.floor(avg);
            const half = avg - full >= 0.5 ? 1 : 0;
            let s = '';
            for(let i=0;i<full;i++) s += '⭐';
            if(half) s += '✨';
            return s + `<span>${avg}分(${count}评)</span>`;
        }

        let bannerBuilt = false;
        function loadData(city="",tag=""){
            let url = `/api/spots?city=${city}&tag=${tag}`
            fetch(url)
            .then(res=>res.json())
            .then(result=>{
                const data = result.data;
                // 首次加载时构建轮播 Banner
                if(!bannerBuilt && !city && !tag){
                    buildBanner(data);
                    bannerBuilt = true;
                }
                const box = document.getElementById("list");
                box.innerHTML = "";
                data.forEach(item=>{
                    let starsHtml = renderStars(item.avg_rating, item.rating_count);
                    let card = `
                    <div class="spot-card" data-id="${item.id}" onclick="goDetail(event,${item.id})">
                        <button class="fav-btn" data-spot="${item.id}" onclick="event.stopPropagation();toggleFav(${item.id})">🤍</button>
                        <img src="static/images/${imgMap[item.name]}.jpg" alt="${item.name}">
                        <div class="info">
                            <div class="name-row">
                                <div class="name">${item.name}</div>
                                <div class="avg-star">${starsHtml}</div>
                            </div>
                            <div class="city">城市：${item.city}</div>
                            <div class="level">等级：${item.level}</div>
                            <div class="tag">标签：${item.tag}</div>
                            <div class="desc">${item.desc || ''}</div>
                        </div>
                    </div>
                    `
                    box.innerHTML += card;
                });
                if(user) markFavs(data);
            })
        }
        loadData();

        function markFavs(spots){
            spots.forEach(item=>{
                fetch(`/api/favorites/check?user_id=${user.id}&spot_id=${item.id}`)
                .then(res=>res.json())
                .then(r=>{
                    if(r.data){
                        const btn = document.querySelector(`.fav-btn[data-spot="${item.id}"]`);
                        if(btn){ btn.textContent = "❤️"; btn.classList.add("fav-active"); }
                    }
                });
            });
        }

        function toggleFav(spotId){
            if(!user){ alert("请先登录"); openModal(); return; }
            const btn = document.querySelector(`.fav-btn[data-spot="${spotId}"]`);
            const isFav = btn.classList.contains("fav-active");
            if(isFav){
                fetch(`/api/favorites?user_id=${user.id}&spot_id=${spotId}`, {method:"DELETE"})
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){ btn.textContent="🤍"; btn.classList.remove("fav-active"); }
                });
            }else{
                fetch("/api/favorites", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({user_id:user.id, spot_id:spotId})
                })
                .then(res=>res.json())
                .then(r=>{
                    if(r.code===200){ btn.textContent="❤️"; btn.classList.add("fav-active"); }
                });
            }
        }

        function goDetail(e, id){
            if(user){
                fetch("/api/history", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({user_id:user.id, spot_id:id})
                });
            }
            location.href = `/detail?id=${id}`;
        }

        document.getElementById("searchBtn").addEventListener("click",()=>{
            let city = document.getElementById("cityInput").value
            let tag = document.getElementById("tagInput").value
            loadData(city,tag)
        })
        document.getElementById("resetBtn").addEventListener("click",()=>{
            document.getElementById("cityInput").value=""
            document.getElementById("tagInput").value=""
            loadData()
        })

        // ========== 登录注册 ==========
        let isRegister = false;
        const user = JSON.parse(localStorage.getItem("user") || "null");
        updateAuthBar();

        function updateAuthBar(){
            const bar = document.getElementById("authBar");
            if(user){
                bar.innerHTML = `
                    <div class="user-info">
                        <a class="profile-link" href="/profile">${user.username}</a>
                        <button onclick="logout()">退出</button>
                    </div>
                `;
            }else{
                bar.innerHTML = `<button class="login-btn" onclick="openModal()">登录</button>`;
            }
        }

        function openModal(){ document.getElementById("authModal").classList.add("show"); }
        function closeModal(){ document.getElementById("authModal").classList.remove("show"); }
        function switchToRegister(){
            isRegister = true;
            document.getElementById("modalTitle").textContent = "注册";
            document.getElementById("authSubmit").textContent = "注册";
            document.getElementById("authEmail").style.display = "block";
            document.getElementById("modalSwitch").innerHTML = `已有账号？<a onclick="switchToLogin()">去登录</a>`;
        }
        function switchToLogin(){
            isRegister = false;
            document.getElementById("modalTitle").textContent = "登录";
            document.getElementById("authSubmit").textContent = "登录";
            document.getElementById("authEmail").style.display = "none";
            document.getElementById("modalSwitch").innerHTML = `还没有账号？<a onclick="switchToRegister()">去注册</a>`;
        }
        function handleAuth(e){
            e.preventDefault();
            const username = document.getElementById("authUsername").value.trim();
            const password = document.getElementById("authPassword").value;
            const email = document.getElementById("authEmail").value.trim();
            const url = isRegister ? "/api/register" : "/api/login";
            const body = isRegister ? {username, password, email} : {username, password};
            fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            })
            .then(res=>res.json())
            .then(result=>{
                if(result.code === 200){
                    if(!isRegister){
                        localStorage.setItem("user", JSON.stringify(result.data));
                        location.reload();
                    }else{
                        alert("注册成功，请登录");
                        switchToLogin();
                    }
                }else{
                    alert(result.msg || (isRegister ? "注册失败" : "登录失败"));
                }
            })
        }
        function logout(){ localStorage.removeItem("user"); location.reload(); }
        document.getElementById("authModal").addEventListener("click", (e)=>{
            if(e.target.id === "authModal") closeModal();
        });
    </script>
</body>
</html>
