<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>游记广场</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ background:#f5f7fa; padding:30px; font-family:"Microsoft YaHei","PingFang SC",sans-serif; }
        .container{ max-width:900px; margin:0 auto; }
        .top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
        .top-bar a{ color:#3478f6; text-decoration:none; font-size:15px; }
        .top-bar a:hover{ text-decoration:underline; }
        .top-bar h1{ font-size:24px; color:#222; }
        .publish-btn{ background:#3478f6; color:#fff; border:none; padding:10px 22px; border-radius:8px; cursor:pointer; font-size:15px; }
        .publish-btn:hover{ background:#2b6ad3; }

        .note-card{ background:#fff; border-radius:12px; padding:20px 24px; margin-bottom:16px; box-shadow:0 1px 8px rgba(0,0,0,0.06); }
        .note-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .note-user{ display:flex; align-items:center; gap:10px; font-size:14px; color:#333; font-weight:bold; }
        .note-avatar{ width:36px; height:36px; border-radius:50%; background:#e0e7ff; display:flex; align-items:center; justify-content:center; font-size:16px; color:#3478f6; overflow:hidden; }
        .note-avatar img{ width:100%; height:100%; object-fit:cover; }
        .note-time{ font-size:12px; color:#bbb; }
        .note-title{ font-size:18px; font-weight:bold; color:#222; margin-bottom:8px; }
        .note-content{ font-size:14px; color:#555; line-height:1.7; margin-bottom:12px; white-space:pre-wrap; max-height:120px; overflow:hidden; }
        .note-spot{ font-size:13px; color:#3478f6; background:#eef4ff; display:inline-block; padding:2px 10px; border-radius:4px; margin-bottom:8px; }
        .note-images{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
        .note-images img{ width:120px; height:90px; object-fit:cover; border-radius:6px; cursor:pointer; transition:transform 0.2s; }
        .note-images img:hover{ transform:scale(1.05); }
        .note-actions{ display:flex; gap:14px; margin-top:10px; font-size:13px; }
        .note-actions .del-note{ color:#ccc; cursor:pointer; background:none; border:none; font-size:13px; }
        .note-actions .del-note:hover{ color:#ff4d4f; }
        .empty-tip{ text-align:center; padding:80px 20px; color:#aaa; font-size:15px; }

        .modal-overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:#00000050; display:none; justify-content:center; align-items:center; z-index:200; overflow-y:auto; }
        .modal-overlay.show{ display:flex; }
        .modal-box{ background:#fff; border-radius:12px; width:600px; max-width:90%; max-height:85vh; overflow-y:auto; padding:28px; position:relative; }
        .modal-box h3{ margin-bottom:18px; text-align:center; }
        .modal-box input, .modal-box textarea, .modal-box select{ width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:12px; }
        .modal-box textarea{ resize:vertical; min-height:150px; }
        .modal-box button[type="submit"]{ width:100%; padding:10px; border:none; border-radius:6px; background:#3478f6; color:#fff; font-size:15px; cursor:pointer; }
        .modal-box .close{ position:absolute; top:12px; right:16px; font-size:22px; cursor:pointer; color:#999; }
        .img-url-row{ display:flex; gap:8px; align-items:center; }
        .img-url-row input{ flex:1; }
        .img-url-row button{ padding:8px 12px; border:none; border-radius:4px; font-size:13px; cursor:pointer; }
        .add-img-btn{ background:#eee; color:#333; }
        .add-img-btn:hover{ background:#ddd; }
        .img-preview-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
        .img-preview-row .thumb{ position:relative; width:80px; height:60px; border-radius:4px; overflow:hidden; }
        .img-preview-row .thumb img{ width:100%; height:100%; object-fit:cover; }
        .img-preview-row .thumb .rm{ position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.6); color:#fff; width:18px; height:18px; border-radius:50%; text-align:center; line-height:18px; font-size:12px; cursor:pointer; }

        .auth-bar{ position:fixed; top:20px; right:30px; z-index:100; }
        .auth-bar button{ padding:8px 18px; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
        .login-btn{ background:#3478f6; color:white; }
        .user-info{ display:flex; align-items:center; gap:10px; background:#fff; padding:8px 14px; border-radius:6px; box-shadow:0 2px 8px #00000012; font-size:14px; }
        .user-info button{ background:#ff4d4f; color:white; }
        .profile-link{ color:#3478f6; cursor:pointer; text-decoration:none; font-weight:bold; }
        .profile-link:hover{ text-decoration:underline; }

        .img-lightbox{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:300; }
        .img-lightbox.show{ display:flex; }
        .img-lightbox img{ max-width:90%; max-height:90%; object-fit:contain; border-radius:8px; }
        .img-lightbox .lb-close{ position:fixed; top:16px; right:24px; font-size:32px; color:#fff; cursor:pointer; z-index:310; }

        @media (max-width:600px){ body{ padding:16px; } .note-images img{ width:80px; height:60px; } }
    </style>
</head>
<body>
    <div class="auth-bar" id="authBar"><button class="login-btn" onclick="openLoginModal()">登录</button></div>
    <div class="container">
        <div class="top-bar">
            <div><a href="/">&larr; 返回首页</a></div>
            <h1>📝 游记广场</h1>
            <button class="publish-btn" onclick="openPublishModal()">写游记</button>
        </div>
        <div id="noteList"></div>
    </div>

    <!-- 发布游记弹窗 -->
    <div class="modal-overlay" id="publishModal">
        <div class="modal-box">
            <div class="close" onclick="closePublishModal()">&times;</div>
            <h3>发布游记</h3>
            <input type="text" id="noteTitle" placeholder="游记标题（必填）" maxlength="200">
            <select id="noteSpot" style="margin-bottom:12px;">
                <option value="">选择关联景点（可选）</option>
            </select>
            <textarea id="noteContent" placeholder="分享你的旅行故事..." maxlength="5000"></textarea>
            <div style="font-size:12px;color:#aaa;margin:-8px 0 10px;text-align:right;"><span id="noteCharCount">0</span>/5000</div>
            <label style="font-size:13px;color:#666;">图片URL（可添加多张）：</label>
            <div id="imgUrlList">
                <div class="img-url-row"><input type="text" class="img-url" placeholder="https://example.com/photo.jpg"><button class="add-img-btn" onclick="addImgUrl()">+</button></div>
            </div>
            <div class="img-preview-row" id="imgPreview"></div>
            <button type="submit" onclick="publishNote()">发布游记</button>
        </div>
    </div>

    <!-- 图片灯箱 -->
    <div class="img-lightbox" id="imgLightbox" onclick="this.classList.remove('show')">
        <span class="lb-close">&times;</span>
        <img src="" id="lbImg" alt="游记图片">
    </div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <div class="close" onclick="closeLoginModal()">&times;</div>
            <h3 id="loginTitle">登录</h3>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUsername" placeholder="用户名" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <input type="email" id="loginEmail" placeholder="邮箱（选填）" style="display:none;">
                <button type="submit" id="loginSubmit">登录</button>
            </form>
            <div style="text-align:center;margin-top:14px;font-size:13px;color:#666;" id="loginSwitch">
                还没有账号？<a style="color:#3478f6;cursor:pointer;text-decoration:underline;" onclick="switchToReg()">去注册</a>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user") || "null");
        let isReg = false;

        function updateAuthBar(){
            const bar = document.getElementById("authBar");
            if(user){
                bar.innerHTML = `<div class="user-info"><a class="profile-link" href="/profile">${user.username}</a><button onclick="logout()">退出</button></div>`;
            }else{
                bar.innerHTML = `<button class="login-btn" onclick="openLoginModal()">登录</button>`;
            }
        }
        updateAuthBar();

        function formatTime(d){ if(!d) return ''; const diff = new Date()-new Date(d); if(diff<60000) return '刚刚'; if(diff<3600000) return Math.floor(diff/60000)+'分钟前'; if(diff<86400000) return Math.floor(diff/3600000)+'小时前'; if(diff<604800000) return Math.floor(diff/86400000)+'天前'; return new Date(d).toLocaleDateString('zh-CN'); }

        // 加载游记列表
        function loadNotes(){
            fetch("/api/notes").then(r=>r.json()).then(result=>{
                const box = document.getElementById("noteList");
                const data = result.data || [];
                if(data.length===0){ box.innerHTML='<div class="empty-tip">还没有游记，快来写第一篇吧 ✍️</div>'; return; }
                box.innerHTML = data.map(n=>{
                    const imgs = JSON.parse(n.images || '[]');
                    let imgsHtml = '';
                    if(imgs.length>0){
                        imgsHtml = '<div class="note-images">'+imgs.map(url=>`<img src="${url}" alt="图片" onclick="event.stopPropagation();openLightbox('${url}')">`).join('')+'</div>';
                    }
                    const spotTag = n.spots ? `<div class="note-spot">📍 ${n.spots.city} · ${n.spots.name}</div>` : '';
                    const isMine = user && n.user_id === user.id;
                    const avt = n.users.avatar_url ? `<img src="${n.users.avatar_url}" alt="">` : (n.users.username||'?').charAt(0).toUpperCase();
                    return `<div class="note-card" id="note-${n.id}">
                        <div class="note-header">
                            <div class="note-user"><div class="note-avatar">${avt}</div>${n.users.username}</div>
                            <span class="note-time">${formatTime(n.created_at)}</span>
                        </div>
                        <div class="note-title">${n.title}</div>
                        <div class="note-content">${n.content}</div>
                        ${spotTag}
                        ${imgsHtml}
                        <div class="note-actions">
                            ${isMine?`<button class="del-note" onclick="delNote(${n.id})">🗑 删除</button>`:''}
                        </div>
                    </div>`;
                }).join('');
            });
        }
        loadNotes();

        function delNote(nid){
            if(!confirm("确定删除这条游记吗？")) return;
            fetch(`/api/notes/${nid}`,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:user.id})})
            .then(r=>r.json()).then(r=>{ if(r.code===200){ const el=document.getElementById("note-"+nid); if(el)el.remove(); } else alert(r.msg); });
        }

        function openLightbox(url){ document.getElementById("lbImg").src=url; document.getElementById("imgLightbox").classList.add("show"); }

        // 发布游记
        function openPublishModal(){
            if(!user){ alert("请先登录"); openLoginModal(); return; }
            fetch("/api/spots").then(r=>r.json()).then(result=>{
                const sel = document.getElementById("noteSpot");
                sel.innerHTML = '<option value="">选择关联景点（可选）</option>' + result.data.map(s=>`<option value="${s.id}">${s.city} · ${s.name}</option>`).join('');
            });
            document.getElementById("publishModal").classList.add("show");
        }
        function closePublishModal(){ document.getElementById("publishModal").classList.remove("show"); }
        document.getElementById("publishModal").addEventListener("click",e=>{ if(e.target.id==="publishModal") closePublishModal(); });
        document.getElementById("noteContent").addEventListener("input",function(){ document.getElementById("noteCharCount").textContent=this.value.length; });

        let imgUrlCount = 1;
        function addImgUrl(){
            imgUrlCount++;
            const row = document.createElement("div");
            row.className = "img-url-row";
            row.innerHTML = `<input type="text" class="img-url" placeholder="https://example.com/photo.jpg"><button class="add-img-btn" style="color:#ff4d4f;background:#fff1f0;" onclick="this.parentElement.remove();imgUrlCount--;">-</button>`;
            document.getElementById("imgUrlList").appendChild(row);
            if(imgUrlCount>=6) document.querySelectorAll(".add-img-btn").forEach(b=>b.style.display="none");
        }
        document.addEventListener("input", function(e){
            if(e.target.classList.contains("img-url")){
                const urls = [...document.querySelectorAll(".img-url")].map(el=>el.value.trim()).filter(u=>u);
                document.getElementById("imgPreview").innerHTML = urls.map(u=>`<div class="thumb"><img src="${u}" alt="预览"></div>`).join('');
            }
        });

        function publishNote(){
            const title = document.getElementById("noteTitle").value.trim();
            const content = document.getElementById("noteContent").value.trim();
            const spotId = document.getElementById("noteSpot").value;
            const imgUrls = [...document.querySelectorAll(".img-url")].map(el=>el.value.trim()).filter(u=>u);
            if(!title){ alert("请输入标题"); return; }
            if(!content){ alert("请输入游记内容"); return; }
            fetch("/api/notes",{
                method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify({user_id:user.id, title, content, spot_id: spotId?parseInt(spotId):null, images:JSON.stringify(imgUrls)})
            }).then(r=>r.json()).then(r=>{
                if(r.code===200){ closePublishModal(); document.getElementById("noteTitle").value=""; document.getElementById("noteContent").value=""; document.getElementById("noteSpot").value=""; document.querySelectorAll(".img-url").forEach((el,i)=>{ if(i===0)el.value=""; else el.parentElement.remove(); }); imgUrlCount=1; document.getElementById("imgPreview").innerHTML=""; loadNotes(); }
                else alert(r.msg);
            });
        }

        function openLoginModal(){ document.getElementById("loginModal").classList.add("show"); }
        function closeLoginModal(){ document.getElementById("loginModal").classList.remove("show"); }
        function switchToReg(){
            isReg=true; document.getElementById("loginTitle").textContent="注册"; document.getElementById("loginSubmit").textContent="注册";
            document.getElementById("loginEmail").style.display="block"; document.getElementById("loginSwitch").innerHTML='已有账号？<a style="color:#3478f6;cursor:pointer;text-decoration:underline;" onclick="switchToLogin()">去登录</a>';
        }
        function switchToLogin(){
            isReg=false; document.getElementById("loginTitle").textContent="登录"; document.getElementById("loginSubmit").textContent="登录";
            document.getElementById("loginEmail").style.display="none"; document.getElementById("loginSwitch").innerHTML='还没有账号？<a style="color:#3478f6;cursor:pointer;text-decoration:underline;" onclick="switchToReg()">去注册</a>';
        }
        function handleLogin(e){
            e.preventDefault();
            const uname = document.getElementById("loginUsername").value.trim();
            const pwd = document.getElementById("loginPassword").value;
            const email = document.getElementById("loginEmail").value.trim();
            const url = isReg ? "/api/register" : "/api/login";
            const body = isReg ? {username:uname, password:pwd, email} : {username:uname, password:pwd};
            fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()).then(r=>{
                if(r.code===200){
                    if(!isReg){ localStorage.setItem("user",JSON.stringify(r.data)); location.reload(); }
                    else{ alert("注册成功，请登录"); switchToLogin(); }
                }else{ alert(r.msg); }
            });
        }
        function logout(){ localStorage.removeItem("user"); location.reload(); }
        document.getElementById("loginModal").addEventListener("click",e=>{ if(e.target.id==="loginModal") closeLoginModal(); });
    </script>
</body>
</html>
